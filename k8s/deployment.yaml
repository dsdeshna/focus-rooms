# ============================================================
# Kubernetes Deployment — Focus Rooms Application
# Runs 2 replicas with health checks, resource limits, and
# environment from Secret + ConfigMap.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: focus-rooms
  namespace: focus-rooms
  labels:
    app: focus-rooms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: focus-rooms
  template:
    metadata:
      labels:
        app: focus-rooms
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/api/metrics"
    spec:
      containers:
        - name: focus-rooms
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/focus-rooms:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: focus-rooms-config
            - secretRef:
                name: focus-rooms-secrets
          # Liveness Probe — restarts pod if unhealthy
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness Probe — removes pod from service if not ready
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      restartPolicy: Always
